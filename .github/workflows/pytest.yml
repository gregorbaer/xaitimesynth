name: Run Python Tests

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        # Install project in development mode first
        pip install -e .
        # Install remaining dependencies, but ignore the -e file:/// line
        grep -v "^-e file:" requirements.txt | xargs pip install -r requirements.txt || true

    - name: Test with pytest
      run: |
        pytest --cov=./
