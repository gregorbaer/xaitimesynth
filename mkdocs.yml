site_name: xaitimesynth
site_description: A Python package for generating synthetic time series with ground truth for XAI evaluation
site_url: https://gregorbaer.github.io/xaitimesynth/
repo_url: https://github.com/gregorbaer/xaitimesynth
repo_name: xaitimesynth

theme:
  name: material
  logo: assets/logo/xaitimesynth_logo.svg
  favicon: assets/logo/favicon.svg
  palette:
    - scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocs-jupyter:
      include: ["*.ipynb"]
      execute: false
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Guides:
      - Overview: guides/overview.ipynb
      - Usage: guides/usage.md
      - YAML Configuration: guides/yaml_config.md
      - Metrics: guides/metrics.md
      - Adding Data Generators: guides/adding_generators.md
  - Examples:
      - Data Structure: examples/data_structure.ipynb
      - Multivariate Time Series: examples/multivariate.ipynb
      - Custom Generator Functions: examples/custom_generators.ipynb
  - API Reference:
      - Builder: api/builder.md
      - Components: api/components.md
      - Visualization: api/visualization.md
      - Metrics: api/metrics.md
      - Registry: api/registry.md
      - Generators: api/generators.md
      - Datasets: api/datasets.md
      - Utilities: api/utilities.md
  - Contributing:
      - Development Setup: contributing/development-setup.md
      - Commit Guidelines: contributing/commit-guidelines.md
      - Documentation: contributing/documentation.md
